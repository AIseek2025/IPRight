services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ipright
      POSTGRES_USER: ipright
      POSTGRES_PASSWORD: ipright
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipright"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - IPRIGHT_DB_TYPE=postgresql
      - IPRIGHT_DATABASE_URL=postgresql+asyncpg://ipright:ipright@postgres:5432/ipright
      - IPRIGHT_DATABASE_SYNC_URL=postgresql://ipright:ipright@postgres:5432/ipright
      - IPRIGHT_REDIS_URL=redis://redis:6379/0
      - IPRIGHT_CELERY_BROKER_URL=redis://redis:6379/1
      - IPRIGHT_CELERY_RESULT_BACKEND=redis://redis:6379/2
      - IPRIGHT_MINIO_ENDPOINT=minio:9000
      - IPRIGHT_DEBUG=true
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - workspace:/tmp/ipright-workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - IPRIGHT_DB_TYPE=postgresql
      - IPRIGHT_DATABASE_URL=postgresql+asyncpg://ipright:ipright@postgres:5432/ipright
      - IPRIGHT_DATABASE_SYNC_URL=postgresql://ipright:ipright@postgres:5432/ipright
      - IPRIGHT_REDIS_URL=redis://redis:6379/0
      - IPRIGHT_CELERY_BROKER_URL=redis://redis:6379/1
      - IPRIGHT_CELERY_RESULT_BACKEND=redis://redis:6379/2
      - IPRIGHT_MINIO_ENDPOINT=minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - workspace:/tmp/ipright-workspace
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  pgdata:
  miniodata:
  workspace:
